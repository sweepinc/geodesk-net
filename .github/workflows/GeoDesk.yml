name: geodesk

on:
  workflow_dispatch:
  push:
    branches:
    - main
    - develop
  pull_request:
    branches:
    - main
    - develop
  release:
    types:
    - created

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout Source
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        submodules: recursive
    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4
      with:
        versionSpec: 6.x
    - name: Execute GitVersion
      uses: gittools/actions/gitversion/execute@v4
    - name: Add NuGet Source (GitHub)
      shell: pwsh
      run: dotnet nuget add source --username USERNAME --password $env:GITHUB_TOKEN --store-password-in-clear-text --name ${{ github.repository_owner }} $env:GITHUB_REPOS
      env:
        GITHUB_REPOS: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: NuGet Restore
      run: dotnet restore GeoDesk.slnx
    - name: Install GOL Tool
      shell: bash
      env:
        GOL_VERSION: 2.2.3
      run: |
        curl -fsSL -o /tmp/gol.zip \
          "https://github.com/clarisma/geodesk-gol/releases/download/v${GOL_VERSION}/gol-${GOL_VERSION}-linux.zip"
        unzip -o /tmp/gol.zip -d /tmp/gol
        sudo install -m 0755 /tmp/gol/gol /usr/local/bin/gol
        command -v gol
        gol --version || true
    - name: Build
      run: |
        dotnet msbuild /m /bl \
          /p:Configuration="Release" \
          /p:Platform="Any CPU" \
          /p:PreReleaseLabel=${GitVersion_PreReleaseLabel} \
          /p:PreReleaseNumber=${GitVersion_WeightedPreReleaseNumber} \
          /p:Version=${GitVersion_FullSemVer} \
          /p:AssemblyVersion=${GitVersion_AssemblySemVer} \
          /p:InformationalVersion=${GitVersion_InformationalVersion} \
          /p:FileVersion=${GitVersion_AssemblySemFileVer} \
          /p:PackageVersion=${GitVersion_FullSemVer} \
          /p:RepositoryUrl="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" \
          /p:PackageProjectUrl="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
          /p:BuildInParallel=true \
          /p:ContinuousIntegrationBuild=true \
          GeoDesk.dist.msbuildproj
    - name: Upload MSBuild Log
      if: ${{ always() }}
      uses: actions/upload-artifact@v5
      with:
        name: msbuild.binlog
        path: msbuild.binlog
    - name: Upload NuGet Packages
      uses: actions/upload-artifact@v5
      with:
        name: nuget
        path: dist/nuget
    - name: Package Tests
      run: tar czvf tests.tar.gz tests
      working-directory: dist
    - name: Upload Tests
      uses: actions/upload-artifact@v5
      with:
        name: tests
        path: dist/tests.tar.gz
  test:
    strategy:
      matrix:
        run:
        - GeoDesk.Tests
        sys:
        - win-x64
        - linux-x64
        - linux-arm64
        tfm:
        - net10.0
    name: Test (${{ matrix.run }}:${{ matrix.tfm }}:${{ matrix.sys }})
    needs:
    - build
    runs-on: ${{ fromJSON('{"win-x86":["windows-2022"],"win-x64":["windows-2022"],"linux-x64":["ubuntu-24.04"],"linux-arm64":["ubuntu-24.04-arm"],"osx-x64":["macos-15-intel"],"osx-arm64":["macos-15"]}')[matrix.sys] }}
    steps:
    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Add NuGet Source (GitHub)
      shell: pwsh
      run: dotnet nuget add source --username USERNAME --password $env:GITHUB_TOKEN --store-password-in-clear-text --name ${{ github.repository_owner }} $env:GITHUB_REPOS
      env:
        GITHUB_REPOS: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Download Tests
      uses: actions/download-artifact@v5
      with:
        name: tests
    - name: Restore Tests
      run: tar xzvf tests.tar.gz
    - name: Execute Tests
      timeout-minutes: 480
      shell: pwsh
      run: |
        # assign powershell variables
        $run = "${{ matrix.run }}"
        $tfm = "${{ matrix.tfm }}"
        $sys = "${{ matrix.sys }}"

        # suite name can contain filter expression after ?
        $split = $run.IndexOf("?")
        if ($split -gt -1) {
            $tst = $run.Substring(0, $split)
            $qry = $run.Substring($split + 1)
        } else {
            $tst = $run
        }

        # scan and process test assemblies
        $tests = $(gi .\tests\$tst\$tfm\*.Tests.dll)
        if ($tests) {
            $argl = @(
                "-f", $tfm,
                "-v:diag",
                "--results-directory", "TestResults",
                "--logger:console;verbosity=diag",
                "--logger:trx"
            )
            
            $runsettings = $(gi .\tests\$tst\$tfm\*.runsettings)
            if ($runsettings) {
                $argl += "--settings:$runsettings"
            }

            if ($qry -ne "" -and $qry -ne $null) {
                $argl += @("--filter", $qry)
                Add-Content $env:GITHUB_ENV "`nRET=TestResults--$tst-$qry--$tfm--$sys"
            } else {
                Add-Content $env:GITHUB_ENV "`nRET=TestResults--$tst--$tfm--$sys"
            }
            
            dotnet test @argl $tests[0].FullName
        }
    - name: Archive Test Results
      if: always() && startsWith(env.RET, 'TestResults--')
      run: tar czvf TestResults.tar.gz TestResults
    - name: Upload Test Results
      if: always() && startsWith(env.RET, 'TestResults--')
      uses: actions/upload-artifact@v5
      with:
        name: ${{ env.RET }}
        path: TestResults.tar.gz
  release:
    name: Release
    if: github.event_name != 'pull_request'
    needs:
    - test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write   # required for NuGet.org Trusted Publishing (OIDC)
    steps:
    - name: Checkout Source
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4
      with:
        versionSpec: 6.x
    - name: Execute GitVersion
      id: GitVersion
      uses: gittools/actions/gitversion/execute@v4
    - name: Download NuGet Packages
      uses: actions/download-artifact@v5
      with:
        name: nuget
        path: dist/nuget
    - name: Create Release
      if: github.ref_type == 'tag'
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ steps.GitVersion.outputs.semVer }}
        allowUpdates: true
        omitBodyDuringUpdate: true
        artifacts: dist/nuget/*.nupkg,dist/nuget/*.snupkg
        makeLatest: true
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Push NuGet (GitHub)
      if: github.event_name != 'pull_request'
      shell: pwsh
      run: dotnet nuget push dist/nuget/*.nupkg --source $env:GITHUB_REPOS --api-key $env:GITHUB_TOKEN --skip-duplicate
      env:
        GITHUB_REPOS: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: NuGet Login (Trusted Publishing)
      if: github.ref_type == 'tag'
      id: nuget-login
      uses: NuGet/login@v1
      with:
        user: jhaltom
    - name: Push NuGet
      if: github.ref_type == 'tag'
      shell: pwsh
      run: dotnet nuget push dist/nuget/*.nupkg --source $env:NUGET_REPOS --api-key $env:NUGET_API_KEY --skip-duplicate
      env:
        NUGET_REPOS: https://api.nuget.org/v3/index.json
        NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
